services:
  db:
    image: docker.io/mariadb:11
    container_name: tbc-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: mangos
      MARIADB_DATABASE: characters
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - tbc-net
    healthcheck:
      test: [CMD, mariadb, -u, root, --password=mangos, -e, SELECT 1]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  realmd:
    image: localhost/tbc-server:local
    container_name: tbc-realmd
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 3724:3724
    volumes:
      - ./etc:/opt/mangos/etc:Z
      - ./data:/opt/mangos/data:ro,Z
    networks:
      - tbc-net
    command: [./realmd]

  mangosd:
    image: localhost/tbc-server:local
    container_name: tbc-mangosd
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8085:8085
    volumes:
      - ./etc:/opt/mangos/etc:Z
      - ./data:/opt/mangos/data:ro,Z
    networks:
      - tbc-net
    stdin_open: true
    tty: true
    command: [./mangosd]

  ptr-realmd:
    image: localhost/tbc-server:ptr
    container_name: ptr-realmd
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 3725:3725
    volumes:
      - ./etc-ptr:/opt/mangos/etc:Z
      - ./data:/opt/mangos/data:ro,Z
    networks:
      - tbc-net
    command: [./realmd]

  ptr-mangosd:
    image: localhost/tbc-server:ptr
    container_name: ptr-mangosd
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8086:8086
    volumes:
      - ./etc-ptr:/opt/mangos/etc:Z
      - ./data:/opt/mangos/data:ro,Z
    networks:
      - tbc-net
    stdin_open: true
    tty: true
    command: [./mangosd]

volumes:
  db-data:

networks:
  tbc-net:
    driver: bridge
